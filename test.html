<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>双向通信测试</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        #output { background: #1e1e1e; color: #fff; padding: 15px; border-radius: 4px; height: 300px; overflow-y: auto; font-family: monospace; }
        .msg { margin: 5px 0; padding: 5px; border-left: 3px solid #4CAF50; }
        .js-msg { border-left-color: #ff9800; }
        .cpp-msg { border-left-color: #2196F3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 双向通信测试</h1>
        
        <div class="section">
            <h2>📤 JS → C++</h2>
            <button onclick="sendToCpp('普通消息')">发送普通消息</button>
            <button onclick="sendToCpp('wifi消息')">发送WiFi消息</button>
            <button onclick="sendToCpp('device消息')">发送设备消息</button>
            <button onclick="sendToCpp('测试: ' + Math.random())">发送随机消息</button>
        </div>
        
        <div class="section">
            <h2>📥 C++ → JS</h2>
            <button onclick="requestFromCpp()">请求C++消息</button>
            <button onclick="changeColor()">改变背景色</button>
            <input type="text" id="msgInput" placeholder="输入消息" style="padding:8px; width:200px;">
            <button onclick="sendCustom()">发送自定义</button>
        </div>
        
        <div class="section">
            <h2>📋 消息记录</h2>
            <button onclick="clearLog()">清空</button>
            <div id="output">
                <div class="msg">系统: 页面加载完成</div>
            </div>
        </div>
    </div>

    <script>
        // 发送消息到C++
        function sendToCpp(msg) {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.fromJS) {
                window.webkit.messageHandlers.fromJS.postMessage(msg);
                addMessage('JS →', msg, 'js-msg');
            } else {
                addMessage('错误', '通信通道不可用', 'error');
            }
        }
        
        // 请求C++消息
        function requestFromCpp() {
            addMessage('系统', '等待C++响应...', '');
        }
        
        // 改变背景色
        function changeColor() {
            document.body.style.backgroundColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            addMessage('系统', '背景色已改变', '');
        }
        
        // 发送自定义消息
        function sendCustom() {
            const input = document.getElementById('msgInput');
            if (input.value) {
                sendToCpp(input.value);
                input.value = '';
            }
        }
        
        //接收来自C++的消息
        window.handleMessageFromCPP = function(message) {
            addMessage('C++ →', message, 'cpp-msg');
        };
        
        // window.handleMessageFromCPP = function(message) {
        //     try {
        //         // 1. 尝试解析JSON
        //         const data = JSON.parse(message);
                
        //         // 2. 根据类型分发处理
        //         switch(data.type) {
        //             case 'AAAA':
        //                 handleAAAA(data);
        //                 break;
        //             default:
        //                 //handleUnknownType(data);
        //         }
                
        //     } catch(e) {
        //         // 3. 如果不是JSON，作为普通文本处理
        //         //handlePlainText(message);
        //     }
        // };


        // function handleAAAA(data) {
        //     console.log('Processing AAAA message:', data);
        //     // 具体的AAAA类型处理逻辑
        //     if (data.value) {
        //         // 处理payload
        //         console.log('Processing AAAAa message:', data.value);
        //     }
        // }


        // 添加消息到记录
        function addMessage(sender, content, cls) {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${sender}: ${content}`;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }
        
        // 清空记录
        function clearLog() {
            document.getElementById('output').innerHTML = '';
        }
        
        // 检查连接
        window.onload = function() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.fromJS) {
                addMessage('系统', '✅ 已连接到C++', '');
            } else {
                addMessage('系统', '❌ 未连接到C++', '');
            }
        };
    </script>
</body>
</html>
